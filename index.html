<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏛️ Wafamsaro Helper Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: #333; min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    h1 { color: #ffd700; text-align: center; margin-bottom: 10px; font-size: 2.5em; }
    h2, h3 { color: white; margin-bottom: 15px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; color: white; font-weight: bold; margin-bottom: 5px; }
    input, textarea { width: 100%; padding: 12px; border: 2px solid #fff; border-radius: 8px; background: rgba(255,255,255,0.9); font-size: 16px; }
    textarea { height: 100px; resize: vertical; }
    .btn { background: linear-gradient(45deg, #ffd700, #ffed4e); color: #1e3c72; border: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: all 0.3s; margin: 5px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
    .btn-danger { background: linear-gradient(45deg, #ff4757, #ff6b7a); color: white; }
    .btn-admin { background: linear-gradient(45deg, #ff6b9d, #c44569); color: white; }
    .btn-success { background: linear-gradient(45deg, #00b894, #00cec9); color: white; }
    .btn-primary { background: linear-gradient(45deg, #3742fa, #5f61f0); color: white; }
    .hidden { display: none; }
    .section { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    #chat-messages, #admin-notifications, #member-broadcast { height: 300px; overflow-y: auto; background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    #chat-messages div, .notification-item, .broadcast-msg { margin-bottom: 10px; padding: 8px; background: #f8f9fa; border-radius: 5px; border-left: 4px solid #007bff; }
    .notification-item.new { background: #d4edda; border-left-color: #28a745; animation: pulse 0.5s; }
    .broadcast-msg.admin { background: #fff3cd; border-left-color: #ffc107; font-weight: bold; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    .notification-item.user { border-left-color: #17a2b8; }
    .notification-item.money { border-left-color: #ffc107; }
    .notification-item.danger { border-left-color: #dc3545; }
    .member-card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; }
    .notification-count { background: #ff4757; color: white; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-left: 10px; }
    .live-indicator { display: inline-block; width: 12px; height: 12px; background: #00ff88; border-radius: 50%; animation: blink 1s infinite; margin-right: 8px; }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
    .broadcast-preview { background: #e9ecef; padding: 10px; border-radius: 5px; margin: 10px 0; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏛️ Wafamsaro Helper Pro <span class="live-indicator"></span></h1>

    <!-- USER LOGIN/REGISTER -->
    <div id="user-auth" class="section">
      <h2>👤 Mwanachama</h2>
      <div class="form-group"><label>Namba Simu:</label><input id="phone" type="tel" placeholder="0712345678"></div>
      <div class="form-group"><label>Jina:</label><input id="name" type="text"></div>
      <div class="form-group"><label>Cheo:</label><input id="title" type="text" placeholder="Mwanachama/Waziri"></div>
      <div class="form-group"><label>PIN (4-6 namba):</label><input id="user-pin" type="password" maxlength="6"></div>
      <div class="form-group"><label>Mchango (TZS):</label><input id="contrib" type="number" value="0"></div>
      <button class="btn" onclick="registerUser()">Sajili/Ingia</button>
      <button class="btn btn-admin" onclick="showAdminLogin()" style="margin-top: 10px;">👑 Admin Login</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="admin-auth" class="section hidden">
      <h2>🔐 Admin Panel</h2>
      <div class="form-group"><label>PIN Admin:</label><input id="admin-pin" type="password" maxlength="4" placeholder="0000"></div>
      <button class="btn btn-admin" onclick="adminLogin()">Ingia</button>
      <button class="btn" onclick="showUserLogin()">← Mwanachama</button>
    </div>

    <!-- USER DASHBOARD -->
    <div id="user-dash" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="user-info"></h2>
        <button class="btn btn-danger" onclick="userLogout()">Ondoka</button>
      </div>
      <div class="stats">
        <div class="stat-card"><div id="user-total-members">0</div>Wanachama</div>
        <div class="stat-card"><div id="user-total-tzs">0</div>Total TZS</div>
      </div>
      
      <!-- BROADCAST MESSAGES FOR USERS -->
      <div class="section">
        <h3>📢 Taarifa za Admin</h3>
        <div id="member-broadcast"></div>
      </div>

      <div class="section">
        <h3>💬 Chat Group</h3>
        <div id="chat-messages"></div>
        <div style="display: flex; gap: 10px;">
          <input id="chat-input" placeholder="Andika ujumbe..." style="flex: 1;">
          <button class="btn" onclick="sendChat()">Tuma</button>
        </div>
      </div>
      
      <div class="section">
        <h3>👥 Wanachama</h3>
        <input id="user-search" placeholder="Tafuta..." oninput="loadUserMembers()" style="width: 100%; padding: 10px; margin-bottom: 15px;">
        <div id="user-members"></div>
      </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-dash" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>🔧 Admin Control Panel</h2>
        <button class="btn btn-danger" onclick="adminLogout()">Ondoka</button>
      </div>
      
      <!-- ADMIN NOTIFICATIONS -->
      <div class="section">
        <h3>🔔 Taarifa za Admin <span class="notification-count" id="notification-count">0</span></h3>
        <div id="admin-notifications"></div>
        <button class="btn" onclick="clearNotifications()" style="margin-top: 10px;">🗑️ Futa Taarifa</button>
      </div>

      <!-- NEW: BROADCAST MESSAGES BOX -->
      <div class="section">
        <h3>📢 Andika Taarifa za Michango</h3>
        <div class="form-group">
          <label>Taifa la Mchango (e.g: "Mchango wa Februari utafanyika 15/02"):</label>
          <textarea id="broadcast-message" placeholder="Andika taarifa kamili ya michango hapa..."></textarea>
        </div>
        <div class="form-group">
          <label>Muda wa Kuonyesha (siku):</label>
          <input id="broadcast-days" type="number" min="1" max="30" value="7" style="width: 100px;">
        </div>
        <button class="btn btn-success" onclick="sendBroadcastMessage()">🚀 Tuma kwa Wanachama Wote</button>
        <div id="broadcast-preview" class="broadcast-preview hidden"></div>
      </div>

      <div class="stats">
        <div class="stat-card"><div id="admin-total-members">0</div>Wanachama</div>
        <div class="stat-card"><div id="admin-total-tzs">0</div>Total TZS</div>
        <div class="stat-card"><div id="admin-total-chat">0</div>Ujumbe</div>
      </div>
      
      <div class="section">
        <h3>🔐 Badilisha PIN</h3>
        <input id="new-admin-pin" type="password" maxlength="4" placeholder="PIN mpya (4 namba)">
        <button class="btn btn-admin" onclick="changeAdminPin()">Badilisha</button>
      </div>
      
      <div class="section">
        <h3>👥 Simamia Wanachama</h3>
        <input id="admin-search" placeholder="Tafuta..." oninput="loadAdminMembers()" style="width: 100%; padding: 10px; margin-bottom: 15px;">
        <div id="admin-members"></div>
      </div>
      
      <div class="section">
        <button class="btn btn-danger" onclick="clearAllChat()">🗑️ Futa Chat Zote</button>
      </div>
    </div>
  </div>

  <!-- FIREBASE CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAbfqdDq5JKUkuSCfFek64Fo9Q_hm2I1RU",
      authDomain: "wafamsaro-helper.firebaseapp.com",
      databaseURL: "https://wafamsaro-helper-default-rtdb.firebaseio.com/",
      projectId: "wafamsaro-helper",
      storageBucket: "wafamsaro-helper.firebasestorage.app",
      messagingSenderId: "391889990192",
      appId: "1:391889990192:web:12e4b8fa204f876ca573f5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let isAdmin = false;
    let notificationCount = 0;
    let notificationsListener = null;
    let broadcastListener = null;

    // BROADCAST MESSAGES SYSTEM
    function initBroadcastMessages() {
      if (broadcastListener) broadcastListener();
      
      broadcastListener = db.ref('broadcastMessages').on('value', (snap) => {
        const broadcasts = snap.val() ? Object.values(snap.val()) : [];
        displayBroadcastMessages(broadcasts);
      });
    }

    function displayBroadcastMessages(broadcasts) {
      let html = '';
      const now = Date.now();
      broadcasts.filter(b => b.expires > now).forEach(b => {
        html += `<div class="broadcast-msg ${b.admin ? 'admin' : ''}">
          <strong>📢 ${b.title || 'ADMIN'}</strong><br>
          ${b.message}<br>
          <small>🗓️ ${new Date(b.time).toLocaleDateString('sw-TZ')} - Inaisha ${new Date(b.expires).toLocaleDateString('sw-TZ')}</small>
        </div>`;
      });
      document.getElementById('member-broadcast').innerHTML = html || '<em>Hakuna taarifa rasmi...</em>';
    }

    function sendBroadcastMessage() {
      const message = document.getElementById('broadcast-message').value.trim();
      const days = parseInt(document.getElementById('broadcast-days').value) || 7;
      
      if (!message) {
        alert('Andika taarifa ya michango!');
        return;
      }

      const expires = Date.now() + (days * 24 * 60 * 60 * 1000);
      
      db.ref('broadcastMessages').push({
        title: 'ADMIN - TAARIFA ZA MICHANGA',
        message,
        admin: true,
        time: Date.now(),
        expires
      }).then(() => {
        addAdminNotification('money', `📢 Taarifa za michango zimetumwa kwa wanachama wote!`);
        document.getElementById('broadcast-message').value = '';
        document.getElementById('broadcast-preview').classList.add('hidden');
        alert('✅ Taarifa zimetumwa kwa wanachama wote!');
      });
    }

    // ADMIN NOTIFICATIONS SYSTEM (unchanged)
    function initAdminNotifications() {
      if (notificationsListener) notificationsListener();
      
      notificationsListener = db.ref('adminNotifications').on('value', (snap) => {
        const notifications = snap.val() ? Object.values(snap.val()) : [];
        displayNotifications(notifications);
        updateNotificationCount(notifications.filter(n => !n.read).length);
      });
    }

    function displayNotifications(notifications) {
      let html = '';
      notifications.slice(-50).reverse().forEach(n => {
        const className = n.read ? '' : 'new';
        const icon = n.type === 'user' ? '👤' : n.type === 'money' ? '💰' : n.type === 'chat' ? '💬' : n.type === 'danger' ? '⚠️' : '📢';
        html += `<div class="notification-item ${className} ${n.type}">
          <strong>${icon} ${n.message}</strong><br>
          <small>${new Date(n.time).toLocaleString('sw-TZ')}</small>
        </div>`;
      });
      document.getElementById('admin-notifications').innerHTML = html || '<em>Hakuna taarifa mpya...</em>';
    }

    function updateNotificationCount(count) {
      notificationCount = count;
      const countEl = document.getElementById('notification-count');
      countEl.textContent = count;
      countEl.style.display = count > 0 ? 'inline-flex' : 'none';
    }

    function addAdminNotification(type, message) {
      db.ref('adminNotifications').push({
        type, message, time: Date.now(), read: false
      });
    }

    function clearNotifications() {
      if (confirm('Futa taarifa zote?')) {
        db.ref('adminNotifications').remove();
      }
    }

    // USER REGISTER/LOGIN
    function registerUser() {
      const phone = document.getElementById('phone').value.replace(/D/g,'');
      const name = document.getElementById('name').value;
      const title = document.getElementById('title').value;
      const pin = document.getElementById('user-pin').value;
      const contrib = parseFloat(document.getElementById('contrib').value) || 0;

      if(phone.length < 9 || !name || pin.length < 4) {
        alert('Jaza taarifa sahihi!');
        return;
      }

      db.ref('members/'+phone).once('value').then(snap => {
        if(!snap.exists()) {
          db.ref('members/'+phone).set({
            phone, name, title, pin, contrib, totalContrib: contrib, joined: Date.now()
          }).then(() => {
            addAdminNotification('user', `👤 MWANACHPYA: ${name} (${phone}) amejisajili!`);
            currentUser = {phone, name, title, contrib, totalContrib: contrib};
            showUserDash();
            initBroadcastMessages(); // Load broadcast messages
            alert('Umeshajisajili!');
          });
        } else {
          const data = snap.val();
          if(data.pin === pin) {
            currentUser = data;
            showUserDash();
            initBroadcastMessages(); // Load broadcast messages
          } else {
            alert('PIN sio sahihi!');
          }
        }
      });
    }

    // ADMIN LOGIN
    function adminLogin() {
      const pin = document.getElementById('admin-pin').value;
      db.ref('config/adminPin').once('value').then(snap => {
        if(pin === (snap.val() || '1987')) {
          isAdmin = true;
          document.getElementById('admin-auth').classList.add('hidden');
          document.getElementById('admin-dash').classList.remove('hidden');
          loadAdminStats();
          loadAdminMembers();
          initAdminNotifications();
          initBroadcastMessages();
          addAdminNotification('user', '👑 Admin ameingia kwenye dashboard');
        } else {
          alert('PIN ya admin sio sahihi! Default: 0000');
        }
      });
    }

    function showUserDash() {
      document.getElementById('user-auth').classList.add('hidden');
      document.getElementById('user-dash').classList.remove('hidden');
      document.getElementById('user-info').innerHTML = 
        `${currentUser.name} (${currentUser.title}) | ${currentUser.phone} | ${currentUser.totalContrib} TZS`;
      loadUserStats();
      loadChat();
      loadUserMembers();
      initBroadcastMessages();
    }

    // CHAT (unchanged)
    function loadChat() {
      db.ref('chat').on('value', snap => {
        let html = '';
        const msgs = snap.val() ? Object.values(snap.val()) : [];
        msgs.sort((a,b)=>a.time-b.time).forEach(m => {
          html += `<div><strong>${m.user}</strong> (${m.phone}): ${m.message}<br><small>${new Date(m.time).toLocaleString()}</small></div>`;
        });
        document.getElementById('chat-messages').innerHTML = html;
      });
    }

    function sendChat() {
      const msg = document.getElementById('chat-input').value.trim();
      if(msg && currentUser) {
        db.ref('chat').push({
          user: currentUser.name, phone: currentUser.phone,
          message: msg, time: Date.now()
        });
        addAdminNotification('chat', `💬 ${currentUser.name} ameutuma ujumbe: "${msg.substring(0,50)}..."`);
        document.getElementById('chat-input').value = '';
      }
    }

    // Other functions remain the same...
    function loadUserStats() {
      db.ref('members').once('value').then(snap => {
        const members = snap.val() ? Object.values(snap.val()) : [];
        const total = members.reduce((sum,m) => sum + (m.totalContrib||0), 0);
        document.getElementById('user-total-members').textContent = members.length;
        document.getElementById('user-total-tzs').textContent = total.toLocaleString();
      });
    }

    function loadAdminStats() {
      db.ref('members').once('value').then(snap => {
        const members = snap.val() ? Object.values(snap.val()) : [];
        const total = members.reduce((sum,m) => sum + (m.totalContrib||0), 0);
        document.getElementById('admin-total-members').textContent = members.length;
        document.getElementById('admin-total-tzs').textContent = total.toLocaleString();
      });
      db.ref('chat').once('value').then(snap => {
        document.getElementById('admin-total-chat').textContent = Object.keys(snap.val()||{}).length;
      });
    }

    // Members lists and other functions...
    function loadUserMembers() {
      const search = document.getElementById('user-search').value.toLowerCase();
      db.ref('members').once('value').then(snap => {
        let html = '';
        const members = snap.val() ? Object.values(snap.val()) : [];
        members.filter(m => m.name.toLowerCase().includes(search) || m.phone.includes(search))
        .forEach(m => {
          const isOwn = m.phone === currentUser.phone;
          html += `<div class="member-card">
            <h4>${m.name} <span style="color:#666">(${m.title})</span></h4>
            <p>📱 ${m.phone} | 💰 ${m.totalContrib||0} TZS | 🗓️ ${new Date(m.joined).toLocaleDateString()}</p>
            ${isOwn ? '<button class="btn btn-danger" onclick="deleteOwn()">Futa Yangu</button>' : ''}
          </div>`;
        });
        document.getElementById('user-members').innerHTML = html;
      });
    }

    function loadAdminMembers() {
      const search = document.getElementById('admin-search').value.toLowerCase();
      db.ref('members').once('value').then(snap => {
        let html = '';
        const members = snap.val() ? Object.values(snap.val()) : [];
        members.filter(m => m.name.toLowerCase().includes(search) || m.phone.includes(search))
        .forEach(m => {
          html += `<div class="member-card" style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <h4>${m.name} (${m.title})</h4>
              <p>📱 ${m.phone} | 💰 ${m.totalContrib||0} TZS</p>
            </div>
            <button class="btn btn-danger" onclick="deleteMember('${m.phone}')">Futa</button>
          </div>`;
        });
        document.getElementById('admin-members').innerHTML = html;
      });
    }

    function deleteOwn() {
      if(confirm('Futa akaunti yako?')) {
        db.ref('members/'+currentUser.phone).remove().then(() => {
          addAdminNotification('danger', `⚠️ AKAUNTI IMEFUKA: ${currentUser.name} (${currentUser.phone})`);
          userLogout();
        });
      }
    }

    function deleteMember(phone) {
      db.ref('members/'+phone).once('value').then(snap => {
        const member = snap.val();
        if(confirm(`Futa ${member.name} (${phone})?`)) {
          db.ref('members/'+phone).remove().then(() => {
            addAdminNotification('danger', `⚠️ IMEFUTWA: ${member.name} (${phone})`);
            loadAdminMembers();
            loadAdminStats();
          });
        }
      });
    }

    function changeAdminPin() {
      const pin = document.getElementById('new-admin-pin').value;
      if(pin.length === 4) {
        db.ref('config/adminPin').set(pin).then(() => {
          alert('PIN imebadilika!');
          addAdminNotification('user', `🔐 PIN ya admin imebadilishwa`);
        });
      } else {
        alert('PIN 4 namba!');
      }
    }

    function clearAllChat() {
      if(confirm('Futa chat zote?')) {
        db.ref('chat').remove().then(() => {
          addAdminNotification('danger', '🗑️ Chat zote zimefutwa');
        });
      }
    }

    function showAdminLogin() {
      document.getElementById('user-auth').classList.add('hidden');
      document.getElementById('admin-auth').classList.remove('hidden');
    }

    function showUserLogin() {
      document.getElementById('admin-auth').classList.add('hidden');
      document.getElementById('user-auth').classList.remove('hidden');
    }

    function userLogout() {
      currentUser = null;
      document.getElementById('user-dash').classList.add('hidden');
      document.getElementById('user-auth').classList.remove('hidden');
      if (broadcastListener) broadcastListener();
    }

    function adminLogout() {
      if (notificationsListener) notificationsListener();
      if (broadcastListener) broadcastListener();
      isAdmin = false;
      document.getElementById('admin-dash').classList.add('hidden');
      document.getElementById('admin-auth').classList.remove('hidden');
      addAdminNotification('user', '👑 Admin ametoka dashboard');
    }

    document.getElementById('chat-input').addEventListener('keypress', e => {
      if(e.key === 'Enter') sendChat();
    });

    document.getElementById('broadcast-message').addEventListener('input', function() {
      const preview = document.getElementById('broadcast-preview');
      preview.innerHTML = `<strong>📢 ADMIN - TAARIFA ZA MICHANGA</strong><br>${this.value}<br><small>🗓️ Leo - Inafuta baada ya siku 7</small>`;
      preview.classList.toggle('hidden', !this.value);
    });
  </script>
</body>
</html>
